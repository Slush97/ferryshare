name: Release

# Single-workflow release flow.
#
# 1. release-please reads conventional commits since the last release and
#    either opens / updates a release PR (if there are changes pending), or
#    cuts a release (if a release PR has just been merged).
# 2. When a release is cut, the build matrix runs and uploads platform
#    artifacts to that release.
#
# This collapses what used to be release-please.yml + release.yml so we don't
# need a PAT to bridge GITHUB_TOKEN's "events from this token don't trigger
# other workflows" rule — both jobs run inside the same workflow execution.

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  build_release:
    needs: release_please
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: main
            target_path: app/main
            dependencies: |
              sudo apt-get install -y libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev
            cache_directory: app/main/src-tauri/target
          - os: macos-latest
            name: main
            target_path: app/main
            cache_directory: app/main/src-tauri/target
          - os: macos-13
            name: main
            target_path: app/main
            cache_directory: app/main/src-tauri/target
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: "${{ github.workspace }}/${{ matrix.cache_directory }}"
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies for U
        if: contains(matrix.os, 'macos') == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Linux dependencies
        if: contains(matrix.os, 'macos') == false
        run: ${{ matrix.dependencies }}

      - name: GLIBC version
        if: contains(matrix.os, 'macos') == false
        run: |
          GLIBC_VER=$(ldd --version | head -n1 | awk '{print $NF}')
          echo "GLIBC version: ${GLIBC_VER}"

      - name: Build Vite + Tauri
        run: |
          rm -rf ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/
          cd ./${{ matrix.target_path }}
          pnpm install
          pnpm build
          cd ${{ github.workspace }}
          ./rename_build.sh ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/ ${{ matrix.name }}

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_please.outputs.tag_name }}
          files: |
            ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/*/ferry-${{ matrix.name }}*
          fail_on_unmatched_files: true
