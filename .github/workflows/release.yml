name: Release

# Tag-driven release flow.
#
# To cut a release:
#   1. Bump version in core_lib/Cargo.toml and app/main/src-tauri/Cargo.toml
#      (run `cargo check` in each to refresh the lockfiles).
#   2. Commit, then `git tag vX.Y.Z && git push origin master --tags`.
#   3. This workflow builds the matrix and attaches platform binaries to
#      the release. If the release does not already exist (e.g. you didn't
#      pre-create it via `gh release create`), softprops/action-gh-release
#      will create it on the fly.
#   4. Edit release notes in the GitHub UI or `gh release edit`.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: main
            target_path: app/main
            dependencies: |
              sudo apt-get install -y libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev
            cache_directory: app/main/src-tauri/target
          - os: macos-latest
            name: main
            target_path: app/main
            cache_directory: app/main/src-tauri/target
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: "${{ github.workspace }}/${{ matrix.cache_directory }}"
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies for U
        if: contains(matrix.os, 'macos') == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Linux dependencies
        if: contains(matrix.os, 'macos') == false
        run: ${{ matrix.dependencies }}

      - name: GLIBC version
        if: contains(matrix.os, 'macos') == false
        run: |
          GLIBC_VER=$(ldd --version | head -n1 | awk '{print $NF}')
          echo "GLIBC version: ${GLIBC_VER}"

      - name: Build Vite + Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          rm -rf ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/
          cd ./${{ matrix.target_path }}
          pnpm install
          pnpm build
          cd ${{ github.workspace }}
          ./rename_build.sh ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/ ${{ matrix.name }}

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/*/ferry-${{ matrix.name }}*
            ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/*/*.app.tar.gz
            ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/*/*.app.tar.gz.sig
          fail_on_unmatched_files: false

  publish_manifest:
    needs: build_release
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p sigs
          # Download all .sig files for this tag's release. `gh release
          # download` exits 1 when no files match the pattern, which would
          # kill us under `set -e` — tolerate that and continue with an
          # empty platforms object so the rest of the pipeline doesn't fail.
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir sigs || true
          ls -la sigs

          if ! ls sigs/*.sig >/dev/null 2>&1; then
            echo "No .sig files in release — updater artifacts likely disabled. Skipping manifest upload."
            exit 0
          fi

          version="${TAG#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          base_url="https://github.com/${REPO}/releases/download/${TAG}"

          # Locate per-platform sig files. Build matrix is linux-x86_64
          # (ubuntu-24.04) + darwin-aarch64 (macos-latest). Intel Mac is no
          # longer built, so darwin-x86_64 is omitted from the manifest.
          linux_sig=$(ls sigs/*amd64*.AppImage.sig 2>/dev/null | head -n1 || true)
          darwin_arm_sig=$(ls sigs/*aarch64*.app.tar.gz.sig 2>/dev/null | head -n1 || true)

          jq_obj=$(jq -n --arg v "$version" --arg d "$pub_date" \
            '{ version: $v, notes: ("Release " + $v), pub_date: $d, platforms: {} }')

          add_platform() {
            local key="$1" sig_file="$2" bundle_name="$3"
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              local sig_content
              sig_content=$(cat "$sig_file")
              jq_obj=$(echo "$jq_obj" | jq \
                --arg k "$key" --arg sig "$sig_content" --arg url "${base_url}/${bundle_name}" \
                '.platforms[$k] = { signature: $sig, url: $url }')
            else
              echo "WARN: no signature file for $key (looked at: '$sig_file')"
            fi
          }

          # Bundle filenames mirror what rename_build.sh produces (Linux),
          # and Tauri's default for macOS .app.tar.gz.
          add_platform "linux-x86_64"   "$linux_sig"      "$(basename "${linux_sig%.sig}" 2>/dev/null || echo "")"
          add_platform "darwin-aarch64" "$darwin_arm_sig" "$(basename "${darwin_arm_sig%.sig}" 2>/dev/null || echo "")"

          echo "$jq_obj" > latest.json
          cat latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
