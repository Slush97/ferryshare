name: Release

# Tag-driven release flow.
#
# To cut a release:
#   1. Bump version in core_lib/Cargo.toml and app/main/src-tauri/Cargo.toml
#      (run `cargo check` in each to refresh the lockfiles).
#   2. Commit, then `git tag vX.Y.Z && git push origin master --tags`.
#   3. This workflow builds the matrix and attaches platform binaries to
#      the release. If the release does not already exist (e.g. you didn't
#      pre-create it via `gh release create`), softprops/action-gh-release
#      will create it on the fly.
#   4. Edit release notes in the GitHub UI or `gh release edit`.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: main
            target_path: app/main
            dependencies: |
              sudo apt-get install -y libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev
            cache_directory: app/main/src-tauri/target
          - os: macos-latest
            name: main
            target_path: app/main
            cache_directory: app/main/src-tauri/target
          - os: macos-13
            name: main
            target_path: app/main
            cache_directory: app/main/src-tauri/target
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: "${{ github.workspace }}/${{ matrix.cache_directory }}"
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies for U
        if: contains(matrix.os, 'macos') == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Linux dependencies
        if: contains(matrix.os, 'macos') == false
        run: ${{ matrix.dependencies }}

      - name: GLIBC version
        if: contains(matrix.os, 'macos') == false
        run: |
          GLIBC_VER=$(ldd --version | head -n1 | awk '{print $NF}')
          echo "GLIBC version: ${GLIBC_VER}"

      - name: Build Vite + Tauri
        run: |
          rm -rf ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/
          cd ./${{ matrix.target_path }}
          pnpm install
          pnpm build
          cd ${{ github.workspace }}
          ./rename_build.sh ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/ ${{ matrix.name }}

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ github.workspace }}/${{ matrix.target_path }}/src-tauri/target/release/bundle/*/ferry-${{ matrix.name }}*
          fail_on_unmatched_files: true
